name: Build and Deploy to S3

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      BUCKET: aiweave.org

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests boto3

      # OIDC credentials are configured before generate_site.py so that
      # the Bedrock client (boto3) can authenticate during README summarization.
      # Required IAM permissions on the role: bedrock:InvokeModel (us-east-1)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239571291755:role/teamweave-github-actions-sam-deployer
          aws-region: us-east-1

      - name: Fetch all .md files and upload to RAG S3 bucket
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python fetch_md_upload_s3.py

      - name: Generate index.html
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate_site.py

      - name: Verify index.html was generated
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: index.html was not generated"
            exit 1
          fi
          echo "index.html size: $(wc -c < index.html) bytes"

      - name: Create S3 bucket if it does not exist
        run: |
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists, skipping creation"
          else
            echo "Creating bucket $BUCKET in us-east-1"
            aws s3api create-bucket --bucket "$BUCKET" --region us-east-1
          fi

      - name: Disable S3 Block Public Access
        run: |
          aws s3api put-public-access-block \
            --bucket "$BUCKET" \
            --public-access-block-configuration \
              "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"

      - name: Enable S3 static website hosting
        run: |
          aws s3api put-bucket-website \
            --bucket "$BUCKET" \
            --website-configuration '{
              "IndexDocument": {"Suffix": "index.html"},
              "ErrorDocument": {"Key": "index.html"}
            }'

      - name: Set S3 bucket public read policy
        run: |
          POLICY=$(cat <<EOF
          {
            "Version": "2012-10-17",
            "Statement": [{
              "Sid": "PublicReadGetObject",
              "Effect": "Allow",
              "Principal": "*",
              "Action": "s3:GetObject",
              "Resource": "arn:aws:s3:::${BUCKET}/*"
            }]
          }
          EOF
          )
          aws s3api put-bucket-policy --bucket "$BUCKET" --policy "$POLICY"

      - name: Upload index.html
        run: |
          aws s3 cp index.html "s3://${BUCKET}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Upload background.svg
        run: |
          aws s3 cp background.svg "s3://${BUCKET}/background.svg" \
            --content-type "image/svg+xml" \
            --cache-control "public, max-age=86400"
      - name: Upload assets
        run: |
          aws s3 cp assets/ "s3://${BUCKET}/assets/" \
            --recursive \
            --cache-control "public, max-age=86400"
      - name: Output website URL
        run: |
          echo "Website: http://${BUCKET}.s3-website-us-east-1.amazonaws.com"
          echo "Custom domain (after DNS): https://aiweave.org"
